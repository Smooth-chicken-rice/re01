<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>佐证材料</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
        }
        body {
            background-color: #f5f5f5;
            padding: 20px;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: #fff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        h1 {
            text-align: center;
            margin-bottom: 30px;
            color: #333;
        }
        /* 网格布局：一行两张 */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
        }
        /* 卡片样式 */
        .card {
            background: #fff;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            transition: transform 0.3s ease;
        }
        .card:hover {
            transform: translateY(-5px);
        }
        /* 图片容器 */
        .card-img {
            width: 100%;
            height: 200px;
            overflow: hidden;
        }
        .card-img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s ease;
        }
        .card:hover .card-img img {
            transform: scale(1.08); /* 鼠标悬停放大 */
        }
        /* 图片抬头 */
        .card-title {
            padding: 12px;
            text-align: center;
            font-size: 16px;
            color: #555;
            background: #fafafa;
        }
        /* 链接样式 */
        .card a {
            text-decoration: none;
            color: inherit;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>个人佐证材料</h1>
        <div class="grid">
            <!-- 卡片1：毕业证书 -->
            <div class="card">
                <a href="https://github.com/Smooth-chicken-rice/re01/blob/main/image/diploma.jpg" target="_blank">
                    <div class="card-img">
                        <img src="image/diploma.jpg" alt="韩山师范学院毕业证书">
                    </div>
                    <div class="card-title">毕业证书</div>
                </a>
            </div>

            <!-- 卡片2：学位证书 -->
            <div class="card">
                <a href="https://github.com/Smooth-chicken-rice/re01/blob/main/image/diploma2.jpg" target="_blank">
                    <div class="card-img">
                        <img src="image/diploma2.jpg" alt="韩山师范学院本科学位证书">
                    </div>
                    <div class="card-title">学位证书</div>
                </a>
            </div>

            <!-- 卡片3：cet6 -->
            <div class="card">
                <a href="https://github.com/Smooth-chicken-rice/re01/blob/main/image/cet6.png" target="_blank">
                    <div class="card-img">
                        <img src="image/cet6.png" alt="大学英语六级">
                    </div>
                    <div class="card-title">大学英语六级证书</div>
                </a>
            </div>

            <!-- 卡片4：学位验证报告书 -->
            <div class="card">
                <a href="https://github.com/Smooth-chicken-rice/re01/blob/main/image/%E5%AD%A6%E7%B1%8D%E5%9C%A8%E7%BA%BF%E9%AA%8C%E8%AF%81%E6%8A%A5%E5%91%8A.png" target="_blank">
                    <div class="card-img">
                        <img src="image/学籍在线验证报告.png" alt="学信网学位验证">
                    </div>
                    <div class="card-title">学籍验证报告书</div>
                </a>
            </div>
                    
                    <!-- 卡片5：普通话证书 -->
            <div class="card">
                <a href="https://github.com/Smooth-chicken-rice/re01/blob/main/image/generalspeaking.jpg" target="_blank">
                    <div class="card-img">
                        <img src="image/generalspeaking.jpg" alt="普通话证书">
                    </div>
                    <div class="card-title">普通话二级甲等</div>
                </a>
            </div>

                      <!-- 卡片6：cet4 -->
            <div class="card">
                <a href="https://github.com/Smooth-chicken-rice/re01/blob/main/image/cet4.jpg" target="_blank">
                    <div class="card-img">
                        <img src="image/cet4.jpg" alt="大学英语四级">
                    </div>
                    <div class="card-title">大学英语四级</div>
                </a>
            </div>

                           <!-- 卡片7：CCT一级 -->
            <div class="card">
                <a href="https://github.com/Smooth-chicken-rice/re01/blob/main/image/CCTLv1.jpg" target="_blank">
                    <div class="card-img">
                        <img src="image/CCTLv1.jpg" alt="广东省计算机一级">
                    </div>
                    <div class="card-title">广东省计算机一级</div>
                </a>
            </div>
        </div>
    </div>
</body>
</html>
